# Local Postgres + Redis for KeyLo API development.
# Mirrors the Railway plugins so `npm run dev` works identically to production.
#   docker compose up -d
#   (then in backend/) npx prisma migrate deploy && npm run prisma:seed && npm run dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keylo
    ports:
      - '5432:5432'
    volumes:
      - keylo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - keylo_redis:/data

volumes:
  keylo_pg:
  keylo_redis:
